<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tractor</title>
    <script>
      (function () {
        var l = window.location;
        var pathSegmentsToKeep = 1;
        var basePath = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
        var rest = l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/');
        var newUrl = basePath + '/?/' + rest;
        if (l.search) {
          newUrl += '&' + l.search.slice(1);
        }
        newUrl += l.hash;
        l.replace(newUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
